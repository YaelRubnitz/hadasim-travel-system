version: '3.8'

services:
  db:
    image: postgres:15
    container_name: hadasim_db
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret_pass
      - POSTGRES_DB=travel_db
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: hadasim_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:secret_pass@db:5432/travel_db
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: hadasim_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app